backend:
  name: github
  repo: YOUR_GITHUB_USERNAME/YOUR_REPO_NAME
  branch: main
  base_url: https://sveltia-cms-auth.YOUR_NETLIFY_SITE.netlify.app

media_folder: public/images
public_folder: /images

site_url: https://YOUR_NETLIFY_SITE.netlify.app

collections:
  - name: products
    label: Products
    label_singular: Product
    folder: public/content/products
    create: true
    delete: true
    slug: "{{slug}}"
    identifier_field: name
    fields:
      - label: Product Name
        name: name
        widget: string
        hint: "Full product name, e.g. Round Aluminum Balustrade Pipe 48mm"
      - label: Product Image
        name: image
        widget: image
        required: false
        hint: "Upload a clear product photo"
      - label: Category
        name: category
        widget: select
        options:
          - Pipes
          - Posts
          - Connectors
          - Brackets
          - Fittings
          - Accessories
          - Flat Bar
          - Other
        default: Accessories
      - label: Tags
        name: tags
        widget: list
        required: false
        hint: "Keywords for search, e.g. round, 48mm, pipe"
        field:
          label: Tag
          name: tag
          widget: string
      - label: Description
        name: description
        widget: text
        required: false
        hint: "Brief description of the product"
